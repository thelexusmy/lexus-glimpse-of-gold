<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Lexus | Glimpse of Gold - Registration</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <p class="eyebrow" style="text-align:center;">
        A LEGACY OF PRECISION
    </p>

    <img
        src="assets/lexus-logo.png"
        alt="Lexus Malaysia"
        class="logo"
        style="display:block;margin-left:auto;margin-right:auto;">

    <h1 style="text-align:center;">
        Complete Your Registration
    </h1>

    <div class="divider"></div>

    <form
        id="registrationForm"
        class="form-card"
        autocomplete="off">

        <div>
            <label for="registeredNRIC">Identification Number (NRIC)</label>
            <input
                id="registeredNRIC"
                type="text"
                class="readonly"
                readonly>
        </div>

        <div>
            <label for="fullname">Full Name</label>
            <input
                id="fullname"
                type="text"
                placeholder="As per NRIC"
                required>
            <p id="nameError" class="field-error"></p>
        </div>

        <div>
            <label for="phone">Mobile Number</label>
            <input
                id="phone"
                type="tel"
                inputmode="numeric"
                maxlength="11"
                placeholder="e.g. 0121234567"
                required>
            <p id="phoneError" class="field-error"></p>
        </div>

        <div>
            <label for="email">Email Address</label>
            <input
                id="email"
                type="email"
                placeholder="you@example.com"
                required>
            <p id="emailError" class="field-error"></p>
        </div>

        <div>
            <label for="outlet">Preferred Lexus Outlet</label>
            <select id="outlet" required>
                <option value="">Select an outlet</option>
                <option value="Lexus Kuala Lumpur">Lexus Kuala Lumpur</option>
                <option value="Lexus Petaling Jaya">Lexus Petaling Jaya</option>
                <option value="Lexus Penang">Lexus Penang</option>
                <option value="Lexus Johor Bahru">Lexus Johor Bahru</option>
                <option value="Lexus Kota Kinabalu">Lexus Kota Kinabalu</option>
                <option value="Lexus Kuching">Lexus Kuching</option>
            </select>
            <p id="outletError" class="field-error"></p>
        </div>

        <div>
            <label for="model">Model of Interest</label>
            <select id="model" required>
                <option value="">Select a model</option>
                <option value="LX">Lexus LX</option>
                <option value="LM">Lexus LM</option>
                <option value="LS">Lexus LS</option>
                <option value="RX">Lexus RX</option>
                <option value="NX">Lexus NX</option>
                <option value="UX">Lexus UX</option>
                <option value="ES">Lexus ES</option>
                <option value="IS">Lexus IS</option>
            </select>
            <p id="modelError" class="field-error"></p>
        </div>

        <div class="section">
            <h2>Areas of Interest (select up to 3)</h2>

            <div class="interests">

                <label>
                    <input type="checkbox" name="interest" value="Test Drive">
                    Test Drive
                </label>

                <label>
                    <input type="checkbox" name="interest" value="Financing Options">
                    Financing Options
                </label>

                <label>
                    <input type="checkbox" name="interest" value="Trade-In">
                    Trade-In
                </label>

                <label>
                    <input type="checkbox" name="interest" value="Latest Promotions">
                    Latest Promotions
                </label>

                <label>
                    <input type="checkbox" name="interest" value="Service Packages">
                    Service Packages
                </label>

            </div>

            <p id="interestError" class="field-error"></p>
        </div>

        <div class="section">
            <h2>Declarations</h2>

            <label class="checkbox">
                <input type="checkbox" id="consent1" class="consent">
                I confirm that the information provided is true and accurate.
            </label>

            <label class="checkbox">
                <input type="checkbox" id="consent2" class="consent">
                I agree to be contacted by Lexus Malaysia regarding this campaign.
            </label>

            <label class="checkbox">
                <input type="checkbox" id="consent3" class="consent">
                I consent to the collection and use of my personal data in accordance with the Personal Data Protection Act (PDPA).
            </label>

            <p id="consentError" class="field-error"></p>
        </div>

        <button type="submit">Submit Registration</button>

    </form>

</div>

<script src="script.js"></script>

</body>

</html>
