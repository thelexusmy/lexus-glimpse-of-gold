<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Lexus | Glimpse of Gold</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container hero">

    <p class="eyebrow">
        A LEGACY OF PRECISION
    </p>

    <img
        src="assets/lexus-logo.png"
        alt="Lexus Malaysia"
        class="logo">

    <h1>
        An Exceptional Journey Awaits
    </h1>

    <div class="divider"></div>

    <p class="subtitle">

        Please verify your registration details below to proceed.

    </p>

    <form
        id="verifyForm"
        class="form-card"
        autocomplete="off">

        <label for="nric">

            Identification Number (NRIC)

        </label>

        <input

            id="nric"

            type="text"

            maxlength="12"

            inputmode="numeric"

            placeholder="YYMMDDXXXXXX"

            required>

        <small>

            Please enter your NRIC without dashes
            (e.g. YYMMDDXXXXXX)
            to verify your eligibility.

        </small>

        <button type="submit">

            Proceed

        </button>

        <p id="error"></p>

    </form>

</div>

<script src="script.js"></script>

</body>

</html>
