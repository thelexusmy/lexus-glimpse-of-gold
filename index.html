<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lexus | An Exceptional Journey Awaits</title>

<link rel="stylesheet" href="style.css">

</head>


<body>

<div class="container">

<p class="eyebrow">
A LEGACY OF PRECISION
</p>


<img src="assets/lexus-logo.png" class="logo" alt="Lexus">


<h1>
An Exceptional Journey Awaits
</h1>


    <div class="divider"></div>


    <p class="subtitle">
        Please verify your registration details below to proceed
    </p>


    <form class="form-box" id="verifyForm">

        <label>
            Identification Number (NRIC)
        </label>


        <input 
        type="text"
        id="nric"
        maxlength="12"
        placeholder="YYMMDDXXXXXX">


        <small>
            Please enter your NRIC without dashes (e.g., YYMMDDXXXXXX) to verify your eligibility.
        </small>


        <button type="submit">
            Proceed
        </button>


        <p id="error"></p>

    </form>


</div>


<script src="script.js"></script>

</body>

</html>
